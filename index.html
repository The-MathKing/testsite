<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Score Action Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #f5f5f5; font-family: 'Inter', sans-serif; }
        .prose h1 { color: #10b981; font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; }
        .prose h2 { color: #34d399; font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose h3 { color: #6ee7b7; font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.6; color: #d4d4d8; }
        .prose ul, .prose ol { margin-left: 1.5rem; margin-bottom: 1rem; list-style-position: outside; }
        .prose li { margin-bottom: 0.25rem; color: #d4d4d8; list-style-type: disc; }
        .prose strong { color: #f4f4f5; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-6">
    <div class="max-w-3xl w-full">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400 mb-4">GEO Action Plan Generator</h1>
            <p class="text-neutral-400 text-lg">Generate a custom step-by-step Generative Engine Optimization plan to improve your AI search score.</p>
        </div>

        <div class="bg-neutral-900 border border-neutral-800 rounded-3xl p-8 mb-8 shadow-xl shadow-emerald-900/20">
            <form id="plannerForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-neutral-300 mb-2">Business Name</label>
                        <input type="text" id="businessName" required class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="e.g. Luigi's Pizza">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-neutral-300 mb-2">Industry</label>
                        <select id="industry" required class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors">
                            <option value="Restaurant / Cafe">Restaurant / Cafe</option>
                            <option value="Retail Store">Retail Store</option>
                            <option value="Dental Clinic">Dental Clinic</option>
                            <option value="Medical Clinic">Medical Clinic</option>
                            <option value="Law Firm">Law Firm</option>
                            <option value="Accounting / Finance">Accounting / Finance</option>
                            <option value="HVAC">HVAC</option>
                            <option value="Roofing">Roofing</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Electrician">Electrician</option>
                            <option value="Landscaping">Landscaping</option>
                            <option value="Cleaning Services">Cleaning Services</option>
                            <option value="Real Estate">Real Estate</option>
                            <option value="Auto Repair / Dealership">Auto Repair / Dealership</option>
                            <option value="Gym / Fitness">Gym / Fitness</option>
                            <option value="Salon / Spa">Salon / Spa</option>
                            <option value="Pet Services">Pet Services</option>
                            <option value="other">Custom / Other</option>
                        </select>
                    </div>
                </div>
                
                <div id="customIndustryContainer" class="hidden">
                    <label class="block text-sm font-semibold text-neutral-300 mb-2">Custom Industry</label>
                    <input type="text" id="customIndustry" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="e.g. Landscaping">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-neutral-300 mb-2">Zip Code</label>
                    <input type="text" id="zipcode" required class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="e.g. 90210">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-neutral-300 mb-2">Gemini API Key (Required)</label>
                    <input type="password" id="apiKey" required class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" placeholder="AIzaSy...">
                    <p class="text-xs text-neutral-500 mt-2">Stored only in your browser memory for this session.</p>
                </div>
                <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl bg-emerald-500 hover:bg-emerald-400 text-neutral-950 font-bold text-lg transition-all flex items-center justify-center gap-2">
                    <span id="btnText">Generate Action Plan</span>
                    <svg id="spinner" class="animate-spin hidden w-5 h-5 text-neutral-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </form>
        </div>

        <div id="resultContainer" class="hidden bg-neutral-900 border border-neutral-800 rounded-3xl p-8 shadow-xl">
            <div id="resultContent" class="prose"></div>
        </div>
    </div>

    <script>
            const industrySelect = document.getElementById('industry');
            const customIndustryContainer = document.getElementById('customIndustryContainer');
            
            industrySelect.addEventListener('change', (e) => {
                if (e.target.value === 'other') {
                    customIndustryContainer.classList.remove('hidden');
                    document.getElementById('customIndustry').required = true;
                } else {
                    customIndustryContainer.classList.add('hidden');
                    document.getElementById('customIndustry').required = false;
                }
            });

        document.getElementById('plannerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');
            
            const businessName = document.getElementById('businessName').value;
            let industry = document.getElementById('industry').value;
            const customIndustry = document.getElementById('customIndustry').value;
            const zipcode = document.getElementById('zipcode').value;
            const apiKey = document.getElementById('apiKey').value;

            if (industry === 'other') {
                industry = customIndustry;
            }
            
            // Combine industry and zipcode for the prompt
            const fullNiche = `${industry} in ${zipcode}`;

            // UI Loading state
            btn.disabled = true;
            btnText.textContent = 'Analyzing AI Overviews...';
            spinner.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            resultContent.innerHTML = '';

            const prompt = `Act as a top-tier Generative Engine Optimization (GEO) expert. 
A business named "${businessName}" operating in the "${fullNiche}" space needs a concrete, 3-step action plan to improve their AI search score and rank higher in ChatGPT, Google AI Overviews, and Perplexity.

Create a highly-structured, actionable plan formatted in Markdown with the following 3 steps:
1. **Directory Consolidation:** How to ensure their business data is consistent across platforms that feed AI models. Give specific platforms relevant to their industry.
2. **Knowledge Graph Injection:** How to get mentioned on high-authority sites that AIs trust. Give specific PR/Outreach strategies.
3. **Conversational Content:** How to structure their website FAQs to perfectly answer AI queries. Give 3 example FAQ questions they should put on their site immediately.

Keep the tone professional, urgent, and highly valuable. Do not use generic fluff.`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7 }
                    })
                });

                if (!response.ok) {
                    throw new Error("Failed to authenticate or generate plan. Check your API key.");
                }

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                resultContent.innerHTML = marked.parse(text);
                resultContainer.classList.remove('hidden');
            } catch (error) {
                resultContent.innerHTML = `<p class="text-rose-500 font-bold">${error.message}</p>`;
                resultContainer.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Generate Action Plan';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
