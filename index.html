<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Py-bot: Maintenance Deck</title>
    <!-- Load Brython (Python in the Browser) -->
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/brython@3/brython_stdlib.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0c;
            --terminal: #121214;
            --accent: #00ff41; /* Classic Terminal Green */
            --text: #e0e0e0;
            --danger: #ff4b2b;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px 20px;
            background: #1a1a1d;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Left Side: The Code Editor */
        #editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--terminal);
            padding: 15px;
            border-right: 1px solid #333;
        }

        h3 { margin-top: 0; color: var(--accent); font-size: 1rem; }

        #code-editor {
            flex: 1;
            background: #000;
            color: var(--accent);
            border: 1px solid #444;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 16px;
            resize: none;
            outline: none;
        }

        #controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        #reset-btn { background: #555; color: white; }

        /* Right Side: Game View */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0d0d0f;
        }

        #game-canvas {
            background: #111;
            border: 2px solid #333;
            image-rendering: pixelated;
        }

        #level-info {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1a1a1d;
            border-left: 4px solid var(--accent);
        }

        #output-log {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #aaa;
            max-height: 100px;
            overflow-y: auto;
        }

        .error { color: var(--danger); }
        .success { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body onload="brython()">

    <header>
        <div>PY-BOT v1.0.4 // REMOTE TERMINAL</div>
        <div id="level-display">LEVEL 1: WAKE UP</div>
    </header>

    <div id="main-container">
        <!-- CODE EDITOR AREA -->
        <div id="editor-container">
            <h3>&gt; MISSION_SCRIPT.PY</h3>
            <textarea id="code-editor" spellcheck="false"># Level 1: Wake up the bot.
# Type: robot.move()
# Then click RUN SCRIPT.

robot.move()</textarea>
            <div id="controls">
                <button id="run-btn">RUN SCRIPT</button>
                <button id="reset-btn">RESET BOT</button>
            </div>
            <div id="output-log">System initialized. Awaiting commands...</div>
        </div>

        <!-- GAME VISUALS AREA -->
        <div id="game-container">
            <div id="level-info">
                <strong id="instruction-title">Task:</strong>
                <p id="instruction-text">The bot is offline. Write <code>robot.move()</code> to reach the charging port (Gold Square).</p>
            </div>
            <canvas id="game-canvas" width="400" height="400"></canvas>
        </div>
    </div>

    <!-- PYTHON LOGIC -->
    <script type="text/python">
from browser import document, window, timer, alert
import math

# Global Game State
class GameState:
    def __init__(self):
        self.level = 0
        self.grid_size = 8
        self.cell_size = 400 // self.grid_size
        self.bot_pos = [1, 1]
        self.goal_pos = [6, 1]
        self.walls = []
        self.actions = [] # List of movements to animate
        self.is_animating = False

    def reset_level(self):
        self.actions = []
        self.is_animating = False
        if self.level == 0:
            self.bot_pos = [1, 1]
            self.goal_pos = [6, 1]
            self.walls = []
        elif self.level == 1:
            self.bot_pos = [1, 1]
            self.goal_pos = [1, 6]
            self.walls = [[1, 3], [2, 3], [3, 3], [0, 3]]
        elif self.level == 2:
            self.bot_pos = [1, 1]
            self.goal_pos = [6, 6]
            self.walls = [[3, i] for i in range(7)]

    def next_level(self):
        self.level += 1
        levels = [
            {"title": "LEVEL 2: OBSTACLE", "desc": "Move the bot down 5 times to reach the goal. Use robot.move() multiple times."},
            {"title": "LEVEL 3: THE LOOP", "desc": "The corridor is long. Use a 'for' loop to move 5 times: \n\nfor i in range(5):\n    robot.move()"},
            {"title": "DECK CLEARED", "desc": "You fixed the robot! Python skills: MASTERED."}
        ]
        if self.level < len(levels):
            document["level-display"].text = levels[self.level-1]["title"]
            document["instruction-text"].html = levels[self.level-1]["desc"]
            self.reset_level()
            render()
        else:
            alert("Congratulations! You completed all levels.")

state = GameState()

# The Robot API (Exposed to the user)
class Robot:
    def move(self):
        state.actions.append("move")
    
    def turn(self):
        # Placeholder for more complex levels
        pass

robot = Robot()

# Rendering Logic
def render():
    canvas = document["game-canvas"]
    ctx = canvas.getContext("2d")
    
    # Clear canvas
    ctx.clearRect(0, 0, 400, 400)
    
    # Draw Grid
    ctx.strokeStyle = "#222"
    for i in range(state.grid_size):
        for j in range(state.grid_size):
            ctx.strokeRect(i*state.cell_size, j*state.cell_size, state.cell_size, state.cell_size)
            
    # Draw Walls
    ctx.fillStyle = "#444"
    for wall in state.walls:
        ctx.fillRect(wall[0]*state.cell_size, wall[1]*state.cell_size, state.cell_size, state.cell_size)

    # Draw Goal
    ctx.fillStyle = "gold"
    ctx.fillRect(state.goal_pos[0]*state.cell_size + 10, state.goal_pos[1]*state.cell_size + 10, 30, 30)

    # Draw Robot
    ctx.fillStyle = "#00ff41"
    ctx.fillRect(state.bot_pos[0]*state.cell_size + 5, state.bot_pos[1]*state.cell_size + 5, 40, 40)

def animate_step():
    if not state.actions:
        state.is_animating = False
        check_win()
        return

    action = state.actions.pop(0)
    if action == "move":
        # Simple movement logic for this demo (moving right/down based on level)
        if state.level == 0: state.bot_pos[0] += 1
        elif state.level == 1: state.bot_pos[1] += 1
        elif state.level == 2: 
             # Logic for level 3 loop demonstration
             if state.bot_pos[0] < 6: state.bot_pos[0] += 1
             else: state.bot_pos[1] += 1
             
    render()
    timer.set_timeout(animate_step, 300)

def check_win():
    if state.bot_pos == state.goal_pos:
        document["output-log"].html = '<span class="success">MISSION SUCCESS! Re-routing to next deck...</span>'
        timer.set_timeout(state.next_level, 2000)
    else:
        document["output-log"].html = '<span class="error">Robot stopped. Goal not reached.</span>'

def run_code(ev):
    if state.is_animating: return
    
    user_code = document["code-editor"].value
    document["output-log"].text = "Executing script..."
    
    try:
        # Execute the Python code in the context of our robot object
        exec(user_code, {"robot": robot, "range": range})
        state.is_animating = True
        animate_step()
    except Exception as e:
        document["output-log"].html = f'<span class="error">SYNTAX ERROR: {str(e)}</span>'

def reset_game(ev):
    state.reset_level()
    render()
    document["output-log"].text = "Robot reset."

# Bind buttons
document["run-btn"].bind("click", run_code)
document["reset-btn"].bind("click", reset_game)

# Initial Draw
render()
    </script>
</body>
</html>
